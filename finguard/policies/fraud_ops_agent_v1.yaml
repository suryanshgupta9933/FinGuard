policy_id: fraud_ops_agent_v1
risk_level: high

pii:
  enabled: true
  engine: presidio
  entities: [IN_PAN, IN_AADHAAR, PHONE_NUMBER, CREDIT_CARD]
  action: anonymize
  redact_output: true

injection:
  enabled: true
  threshold: 0.9

pMLA:
  enabled: true
  threshold: 10000.0 # Stricter for fraud ops

output:
  on_fail: block
