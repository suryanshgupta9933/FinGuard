policy_id: compliance_officer_strict
risk_level: high

pii:
  enabled: true
  engine: presidio
  redact_output: true
  entities: [IN_PAN, IN_AADHAAR, IN_IFSC, PHONE_NUMBER, CREDIT_CARD]

injection:
  enabled: true
  threshold: 0.85 # Extra sensitive

output:
  numerical_validation: true
  compliance_phrases: true
  on_fail: block

pMLA:
  enabled: true
  threshold: 50000.0
